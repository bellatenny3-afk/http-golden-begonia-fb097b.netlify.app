<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gradient)" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Chat Bubbles -->
  <!-- Left Bubble -->
  <g>
    <path d="M 35 70 Q 35 60 45 60 L 75 60 Q 85 60 85 70 L 85 90 Q 85 100 75 100 L 50 100 L 40 110 L 45 100 L 45 100 Q 35 100 35 90 Z" fill="#ffffff" opacity="0.95"/>
    <line x1="45" y1="75" x2="75" y2="75" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <line x1="45" y1="85" x2="70" y2="85" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Right Bubble -->
  <g>
    <path d="M 115 100 Q 115 90 125 90 L 155 90 Q 165 90 165 100 L 165 120 Q 165 130 155 130 L 130 130 L 120 140 L 125 130 L 125 130 Q 115 130 115 120 Z" fill="#e0e7ff" opacity="0.9"/>
    <line x1="125" y1="105" x2="155" y2="105" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
    <line x1="125" y1="115" x2="150" y2="115" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Face Icon in Center -->
  <g transform="translate(100, 100)">
    <!-- Eyes -->
    <circle cx="-12" cy="-8" r="3" fill="#3b82f6"/>
    <circle cx="12" cy="-8" r="3" fill="#3b82f6"/>
    
    <!-- Smile -->
    <path d="M -15 5 Q 0 15 15 5" stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
